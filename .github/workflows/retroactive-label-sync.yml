name: Retroactive Label Sync

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print what would happen without applying changes)'
        required: false
        type: boolean
        default: false
      target:
        description: 'What to process'
        required: true
        type: choice
        options:
          - 'all'
          - 'issues-only'
          - 'prs-only'

permissions:
  pull-requests: write
  issues: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-labels:
    name: Retroactive Label Sync
    runs-on: ubuntu-latest

    steps:
      - name: Ensure all labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            const labelSpecs = {
              'level:beginner':     { color: '22c55e', description: 'Beginner difficulty level' },
              'level:intermediate': { color: '3b82f6', description: 'Intermediate difficulty level' },
              'level:advanced':     { color: 'f97316', description: 'Advanced difficulty level' },
              'level:critical':     { color: '6b7280', description: 'Critical difficulty level' },
              'quality:clean':       { color: '22c55e', description: 'Clean, well-written code' },
              'quality:exceptional': { color: '8b5cf6', description: 'Exceptional quality contribution' },
              'type:bug':         { color: 'ef4444', description: "Something isn't working as expected" },
              'type:feature':     { color: '10b981', description: 'New features, additions, or enhancements' },
              'type:docs':        { color: '3b82f6', description: 'Documentation changes or README updates' },
              'type:testing':     { color: '8b5cf6', description: 'Adding, updating, or fixing tests' },
              'type:security':    { color: 'f59e0b', description: 'Security fixes, dependency updates, or hardening' },
              'type:performance': { color: '6366f1', description: 'Code changes that improve performance/speed' },
              'type:design':      { color: 'ec4899', description: 'UI designs, styling, and themes' },
              'type:refactor':    { color: '14b8a6', description: 'Code changes that neither fix a bug nor add a feature' },
              'gssoc:approved':   { color: '22c55e', description: 'Approved for GSSoC points' },
              'status:blocked':   { color: 'dc2626', description: 'This PR is blocked due to a failing CI check.' },
              'needs-rebase':     { color: 'e11d48', description: 'This PR has merge conflicts and needs a rebase.' },
              'needs-details':    { color: 'f97316', description: 'This PR is missing required description details.' },
              'inactive':         { color: '6b7280', description: 'This PR was closed due to inactivity.' },
              'possible-duplicate': { color: 'fbca04', description: 'This issue may be a duplicate.' },
              'Gssoc 26':         { color: '0e8a16', description: 'GSSoC 2026 program' },
            };

            console.log('🔄 Ensuring all labels exist...');
            for (const [name, spec] of Object.entries(labelSpecs)) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (err) {
                if (err.status === 404) {
                  console.log(`  ➕ Creating label "${name}"...`);
                  await github.rest.issues.createLabel({ owner, repo, name, color: spec.color, description: spec.description });
                }
              }
            }
            console.log('✅ All labels verified.');

      - name: Process all PRs
        if: >
          github.event.inputs.target == 'all' ||
          github.event.inputs.target == 'prs-only'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const dryRun = ${{ github.event.inputs.dry_run || false }};

            const prefixMapping = {
              'fix': 'type:bug', 'bug': 'type:bug', 'bugfix': 'type:bug', 'hotfix': 'type:bug',
              'feat': 'type:feature', 'feature': 'type:feature',
              'docs': 'type:docs', 'doc': 'type:docs',
              'test': 'type:testing', 'testing': 'type:testing',
              'security': 'type:security', 'sec': 'type:security',
              'perf': 'type:performance', 'performance': 'type:performance',
              'style': 'type:design', 'design': 'type:design', 'ui': 'type:design', 'css': 'type:design',
              'refactor': 'type:refactor', 'cleanup': 'type:refactor',
            };

            function detectType(text) {
              if (!text) return null;
              const conventionalRegex = /^\s*([a-zA-Z0-9_-]+)(?:\(.*\))?!?\s*:/i;
              const match = text.match(conventionalRegex);
              if (match) {
                const prefix = match[1].toLowerCase();
                if (prefixMapping[prefix]) return prefixMapping[prefix];
              }
              const clean = text.toLowerCase().trim();
              for (const [key, label] of Object.entries(prefixMapping)) {
                if (clean.startsWith(key + '/') || clean.startsWith(key + '-') || clean === key) {
                  return label;
                }
              }
              return null;
            }

            // Fetch ALL PRs (open + closed + merged)
            console.log('📂 Fetching all pull requests...');
            const allPRs = await github.paginate(github.rest.pulls.list, {
              owner, repo, state: 'all', per_page: 100,
            });
            console.log(`Found ${allPRs.length} total PRs.`);

            let labeled = 0;
            let skipped = 0;

            for (const pr of allPRs) {
              const currentLabels = pr.labels.map(l => l.name);
              const labelsToAdd = [];

              // 1. Add gssoc labels if missing
              if (!currentLabels.includes('Gssoc 26')) labelsToAdd.push('Gssoc 26');
              if (!currentLabels.includes('gssoc:approved')) labelsToAdd.push('gssoc:approved');

              // 2. Auto-detect type from title or branch
              const hasTypeLabel = currentLabels.some(l => l.startsWith('type:'));
              if (!hasTypeLabel) {
                const typeLabel = detectType(pr.title) || detectType(pr.head.ref);
                if (typeLabel) labelsToAdd.push(typeLabel);
              }

              // 3. Inherit labels from linked issues
              const prBody = pr.body || '';
              const issueRegex = /(?:fix|fixes|fixed|close|closes|closed|resolve|resolves|resolved)\s+#(\d+)/gi;
              let match;
              while ((match = issueRegex.exec(prBody)) !== null) {
                const issueNum = parseInt(match[1]);
                try {
                  const { data: issue } = await github.rest.issues.get({ owner, repo, issue_number: issueNum });
                  for (const label of issue.labels) {
                    if (!currentLabels.includes(label.name) && !labelsToAdd.includes(label.name)) {
                      labelsToAdd.push(label.name);
                    }
                  }
                } catch (e) {
                  // Issue doesn't exist, skip
                }
              }

              if (labelsToAdd.length > 0) {
                console.log(`PR #${pr.number} "${pr.title.substring(0, 50)}" → +[${labelsToAdd.join(', ')}]`);
                if (!dryRun) {
                  await github.rest.issues.addLabels({ owner, repo, issue_number: pr.number, labels: labelsToAdd });
                }
                labeled++;
              } else {
                skipped++;
              }
            }

            console.log(`\n🏁 Done! ${dryRun ? '[DRY RUN] ' : ''}Labeled: ${labeled}, Already up-to-date: ${skipped}`);

      - name: Process all Issues
        if: >
          github.event.inputs.target == 'all' ||
          github.event.inputs.target == 'issues-only'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const dryRun = ${{ github.event.inputs.dry_run || false }};

            // Fetch ALL issues (open + closed), excluding PRs
            console.log('📂 Fetching all issues...');
            const allItems = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'all', per_page: 100,
            });
            const allIssues = allItems.filter(i => !i.pull_request);
            console.log(`Found ${allIssues.length} total issues.`);

            let labeled = 0;
            let skipped = 0;

            for (const issue of allIssues) {
              const currentLabels = issue.labels.map(l => l.name);
              const labelsToAdd = [];

              // Add GSSoC labels to issues that have assignees (were worked on)
              if (issue.assignees && issue.assignees.length > 0) {
                if (!currentLabels.includes('Gssoc 26')) labelsToAdd.push('Gssoc 26');
              }

              // Auto-detect type from issue title
              const title = issue.title.toLowerCase();
              const hasTypeLabel = currentLabels.some(l => l.startsWith('type:'));
              if (!hasTypeLabel) {
                if (title.includes('[bug]') || title.includes('bug:') || title.includes('fix:')) {
                  labelsToAdd.push('type:bug');
                } else if (title.includes('[feature]') || title.includes('feat:') || title.includes('feature:')) {
                  labelsToAdd.push('type:feature');
                } else if (title.includes('[docs]') || title.includes('doc:') || title.includes('docs:')) {
                  labelsToAdd.push('type:docs');
                } else if (title.includes('[design]') || title.includes('ui:') || title.includes('style:') || title.includes('css')) {
                  labelsToAdd.push('type:design');
                } else if (title.includes('[security]') || title.includes('security:')) {
                  labelsToAdd.push('type:security');
                } else if (title.includes('[performance]') || title.includes('perf:')) {
                  labelsToAdd.push('type:performance');
                } else if (title.includes('[refactor]') || title.includes('refactor:')) {
                  labelsToAdd.push('type:refactor');
                } else if (title.includes('[test]') || title.includes('test:')) {
                  labelsToAdd.push('type:testing');
                }
              }

              if (labelsToAdd.length > 0) {
                console.log(`Issue #${issue.number} "${issue.title.substring(0, 50)}" → +[${labelsToAdd.join(', ')}]`);
                if (!dryRun) {
                  await github.rest.issues.addLabels({ owner, repo, issue_number: issue.number, labels: labelsToAdd });
                }
                labeled++;
              } else {
                skipped++;
              }
            }

            console.log(`\n🏁 Done! ${dryRun ? '[DRY RUN] ' : ''}Labeled: ${labeled}, Already up-to-date: ${skipped}`);
